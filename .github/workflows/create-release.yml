name: Create Release

permissions:
  contents: write

on:
  push:
    paths:
      - "src/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Append short SHA to mod_version
        run: |
          echo "Appending short sha ${{ steps.vars.outputs.sha_short }} to mod_version in gradle.properties"
          ORIGINAL=$(grep -E '^mod_version' gradle.properties | cut -d= -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          BASE=${ORIGINAL%%-*}
          NEW="${BASE}-${{ steps.vars.outputs.sha_short }}"
          sed -E -i "s/^(mod_version[[:space:]]*=[[:space:]]*).*/\1${NEW}/" gradle.properties
          echo "mod_version updated to $(grep -E '^mod_version' gradle.properties)"

      - name: Build with Gradle
        run: ./gradlew build



      - name: Get Minecraft version
        id: mc
        run: |
          mc=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2 || true)
          if [ -z "$mc" ]; then
            mc="unknown"
          fi
          echo "mc_version=$mc" >> $GITHUB_OUTPUT

      - name: Create and push tag
        id: tag
        run: |
          TAG="${{ steps.mc.outputs.mc_version }}-${{ steps.vars.outputs.sha_short }}"
          echo "Tag will be: $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists, skipping creation"
          else
            git tag -a "$TAG" -m "Automated release $TAG"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release_info.json
        id: release_info
        run: |
          echo "Creating release_info.json with minecraft_version=${{ steps.mc.outputs.mc_version }}"
          printf '{"minecraft_version":"%s"}' "${{ steps.mc.outputs.mc_version }}" > release_info.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release for commit ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            build/libs/*.jar
            release_info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
